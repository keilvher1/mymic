name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    env:
      KAKAO_CLIENT_ID: dummy_for_build
      KAKAO_CLIENT_SECRET: dummy_for_build
      NEXTAUTH_SECRET: dummy_for_build_secret_key_32chars
      NEXTAUTH_URL: http://localhost:3000
      SPOTIFY_CLIENT_ID: dummy_for_build
      SPOTIFY_CLIENT_SECRET: dummy_for_build
      NEXT_PUBLIC_FIREBASE_APP_ID: dummy
      FIREBASE_ADMIN_PROJECT_ID: dummy
      FIREBASE_ADMIN_CLIENT_EMAIL: dummy@dummy.iam.gserviceaccount.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high || true

  deploy-check:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: [quality, build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "All CI checks passed. Vercel auto-deploying." >> $GITHUB_STEP_SUMMARY
